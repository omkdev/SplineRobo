<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoboMind | AI Assistant</title>
  <link rel="icon" type="image/png" href="assets/images/Favicon.png" />
  <link rel="stylesheet" href="style.css" />
  <script
    type="module"
    src="https://unpkg.com/@splinetool/viewer@1.10.86/build/spline-viewer.js"
  ></script>
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <h1 class="logo">RoboMind</h1>
      <button class="btn nav-btn">Get Started</button>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero-text">
        <p class="tagline">Future-ready AI assistant</p>
        <h2>Meet Your AI Robot Assistant</h2>
        <p>
          Experience smarter automation with RoboMind. It helps you manage
          tasks, answer questions, and adapt to your workflow.
        </p>
        <button class="btn glow" id="activate-btn">Activate Robot</button>
      </div>

      <div class="hero-model">
        <spline-viewer
          id="robot-viewer"
          url="https://prod.spline.design/6UB3HNHsZK6c40R2/scene.splinecode"
        ></spline-viewer>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 RoboMind | Powered by Spline | Created for learning purposes</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
